<!DOCTYPE html>
<html>
<head>
    <title> My first website </title>
    <style>
        body {
            background-color: rgb(82, 82, 82);
            color: white;
            font-family: arial;
            text-align: center;
        }

        .everything {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #ffcc00;
        }

        .link {
            display: block;
            text-decoration: none;
            color: rgb(0, 119, 255);
            font-size: 25px;
            margin-bottom: 20px;
        }

        img {
            width: 400px;
            display: block;
            margin: 10px auto;
        }
    </style>
</head>
<body>

    <p style="font-size: 50px;"> Welcome to my website</p>
    <p style="font-size: 30px;"> Here you can find your favorite websites</p>
    <div class="everything">

        <div class="column">
            <p class="title">Information</p>
            <a href="https://google.com" class="link" target="_blank"><img src="Pictures/Google.png">Google</a>
            <a href="https://wikipedia.org" class="link" target="_blank"><img src="Pictures/Wikipedia.png">Wikipedia</a>
            <a href="https://yahoo.com" class="link" target="_blank"><img src="Pictures/Yahoo.png">Yahoo</a>
        </div>

        <div class="column">
            <p class="title">Entertainment</p>
            <a href="https://youtube.com" class="link" target="_blank"><img src="Pictures/Youtube.png">Youtube</a>
            <a href="https://netflix.com" class="link" target="_blank"><img src="Pictures/Netflix.png">Netflix</a>
            <a href="https://tiktok.com" class="link" target="_blank"><img src="Pictures/Tiktok.png">TikTok</a>
            <a href="https://instagram.com" class="link" target="_blank"><img src="Pictures/Insta.png">Instagram</a>
        </div>

        <div class="column">
            <p class="title">Gaming</p>
            <a href="https://store.steampowered.com" class="link" target="_blank"><img src="Pictures/Steam.png">Steam</a>
            <a href="https://itch.io" class="link" target="_blank"><img src="Pictures/Itch.png">Itch</a>
            <a href="https://github.com" class="link" target="_blank"><img src="Pictures/Github.png">Github</a>
        </div>

    </div>

</body>
</html>
